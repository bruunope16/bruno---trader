<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bruno Trader Pro V2.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }
        
        h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .version {
            color: #764ba2;
            font-size: 1.2em;
            font-weight: bold;
        }
        
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .card h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.2em;
        }
        
        .stat {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        
        .stat:last-child {
            border-bottom: none;
        }
        
        .stat-label {
            color: #666;
        }
        
        .stat-value {
            font-weight: bold;
            color: #333;
        }
        
        .signals {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        
        .signal-item {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
        }
        
        .signal-item:last-child {
            margin-bottom: 0;
        }
        
        .signal-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        
        .signal-pair {
            font-size: 1.3em;
            font-weight: bold;
            color: #667eea;
        }
        
        .signal-score {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }
        
        .signal-details {
            font-size: 0.9em;
            color: #666;
            line-height: 1.6;
        }
        
        .logs {
            background: #1e1e1e;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-height: 400px;
            overflow-y: auto;
        }
        
        .log-item {
            padding: 8px;
            margin-bottom: 5px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }
        
        .log-success { background: #2d5016; color: #a5d6a7; }
        .log-info { background: #01579b; color: #81d4fa; }
        .log-warning { background: #e65100; color: #ffcc80; }
        .log-error { background: #b71c1c; color: #ef9a9a; }
        
        .status-online {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: #4caf50;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Bruno Trader Pro</h1>
            <div class="version">
                <span class="status-online"></span>
                Versão <span id="version">Carregando...</span>
            </div>
        </div>
        
        <div class="cards" id="stats-cards">
            <div class="loading">Carregando estatísticas...</div>
        </div>
        
        <div class="signals">
            <h3 style="color: #667eea; margin-bottom: 20px;">📊 Últimos Sinais</h3>
            <div id="signals-list">
                <div class="loading" style="color: #666;">Carregando sinais...</div>
            </div>
        </div>
        
        <div class="logs">
            <h3 style="color: #81d4fa; margin-bottom: 15px;">📝 Logs do Sistema</h3>
            <div id="logs-list">
                <div class="loading">Carregando logs...</div>
            </div>
        </div>
    </div>

    <script>
        // Atualizar dados
        async function updateData() {
            try {
                // Status
                const statusRes = await fetch('/api/status');
                const status = await statusRes.json();
                
                document.getElementById('version').textContent = status.version || '2.0.0';
                
                // Cards de stats
                const uptime = Math.floor(status.uptime / 60);
                const statsHTML = `
                    <div class="card">
                        <h3>⚙️ Sistema</h3>
                        <div class="stat">
                            <span class="stat-label">Status</span>
                            <span class="stat-value">${status.status === 'online' ? '🟢 Online' : '🔴 Offline'}</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Uptime</span>
                            <span class="stat-value">${uptime} min</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Risco</span>
                            <span class="stat-value">${status.config?.risk || '2%'}</span>
                        </div>
                    </div>
                    
                    <div class="card">
                        <h3>📊 Análises</h3>
                        <div class="stat">
                            <span class="stat-label">Realizadas</span>
                            <span class="stat-value">${status.analysisCount || 0}</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Pares</span>
                            <span class="stat-value">${status.config?.pairs || 15}</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Sinais</span>
                            <span class="stat-value">${status.signalsCount || 0}</span>
                        </div>
                    </div>
                    
                    <div class="card">
                        <h3>💰 Resultados</h3>
                        <div class="stat">
                            <span class="stat-label">Trades</span>
                            <span class="stat-value">${status.stats?.totalTrades || 0}</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Win Rate</span>
                            <span class="stat-value">${status.stats?.winRate || 0}%</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Profit</span>
                            <span class="stat-value">R$ ${status.stats?.totalProfit?.toFixed(2) || '0.00'}</span>
                        </div>
                    </div>
                `;
                document.getElementById('stats-cards').innerHTML = statsHTML;
                
                // Sinais
                const signalsRes = await fetch('/api/signals');
                const signalsData = await signalsRes.json();
                
                if (signalsData.signals && signalsData.signals.length > 0) {
                    const signalsHTML = signalsData.signals.map(signal => `
                        <div class="signal-item">
                            <div class="signal-header">
                                <span class="signal-pair">${signal.symbol} ${signal.direction}</span>
                                <span class="signal-score">${signal.score}/100</span>
                            </div>
                            <div class="signal-details">
                                <strong>Entrada:</strong> $${signal.entry} | 
                                <strong>Stop:</strong> $${signal.stopLoss} | 
                                <strong>TP1:</strong> $${signal.tp1} | 
                                <strong>TP2:</strong> $${signal.tp2}<br>
                                <strong>R:R:</strong> 1:${signal.rr} | 
                                <strong>RSI:</strong> ${signal.rsi} | 
                                <strong>Volume:</strong> ${signal.volume24h}<br>
                                <strong>Sinais:</strong> ${signal.signals}
                            </div>
                        </div>
                    `).join('');
                    document.getElementById('signals-list').innerHTML = signalsHTML;
                } else {
                    document.getElementById('signals-list').innerHTML = '<div class="loading" style="color: #666;">Nenhum sinal ainda. Aguardando mercado...</div>';
                }
                
                // Logs
                const logsRes = await fetch('/api/logs');
                const logsData = await logsRes.json();
                
                if (logsData.logs && logsData.logs.length > 0) {
                    const logsHTML = logsData.logs.slice(0, 30).map(log => {
                        const time = new Date(log.timestamp).toLocaleTimeString('pt-BR');
                        return `<div class="log-item log-${log.type}">[${time}] ${log.message}</div>`;
                    }).join('');
                    document.getElementById('logs-list').innerHTML = logsHTML;
                }
                
            } catch (error) {
                console.error('Erro ao atualizar dados:', error);
            }
        }
        
        // Atualizar a cada 10 segundos
        updateData();
        setInterval(updateData, 10000);
    </script>
</body>
  </html>
