<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robô IA Dashboard</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Inter', sans-serif;
}

body{
background: linear-gradient(145deg,#2e2e2e,#1f1f1f);
color:#e6e6e6;
min-height:100vh;
padding:20px;
}

.dashboard{
max-width:1400px;
margin:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.title{
font-size:26px;
font-weight:600;
}

.status{
padding:8px 18px;
border-radius:20px;
background:linear-gradient(145deg,#3a4a5a,#2a3644);
box-shadow: 5px 5px 10px #1a1a1a,
-5px -5px 10px #383838;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,0.05);
border-radius:20px;
padding:20px;
backdrop-filter: blur(20px);
box-shadow:
8px 8px 20px rgba(0,0,0,0.6),
-4px -4px 12px rgba(255,255,255,0.05);
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
}

.card-title{
font-size:14px;
opacity:0.7;
margin-bottom:10px;
}

.card-value{
font-size:28px;
font-weight:600;
}

.signal-card{
grid-column: span 2;
}

.signal-long{
color:#4fd1c5;
}

.signal-short{
color:#f87171;
}

.progress{
margin-top:10px;
height:10px;
border-radius:20px;
background:rgba(255,255,255,0.1);
overflow:hidden;
}

.progress-bar{
height:100%;
background:linear-gradient(90deg,#4a90e2,#7f5af0);
width:85%;
}

.last-signals{
max-height:300px;
overflow-y:auto;
}

.signal-item{
padding:12px;
border-radius:12px;
margin-bottom:10px;
background:rgba(255,255,255,0.04);
}

.footer{
margin-top:20px;
text-align:center;
opacity:0.6;
}

</style></head><body><div class="dashboard"><div class="header">
<div class="title">🤖 Robô IA Profissional</div>
<div class="status">🟢 Online</div>
</div><div class="grid"><div class="card signal-card">
<div class="card-title">Sinal Atual</div>
<div class="card-value signal-long">BTCUSDT LONG</div>
<div class="progress">
<div class="progress-bar"></div>
</div>
</div><div class="card">
<div class="card-title">Score IA</div>
<div class="card-value">96/100</div>
</div><div class="card">
<div class="card-title">Confiança</div>
<div class="card-value">94%</div>
</div><div class="card">
<div class="card-title">Win Rate</div>
<div class="card-value">82%</div>
</div><div class="card">
<div class="card-title">Lucro Hoje</div>
<div class="card-value">+5.4%</div>
</div><div class="card">
<div class="card-title">Volume</div>
<div class="card-value">Alto</div>
</div><div class="card">
<div class="card-title">Volatilidade</div>
<div class="card-value">Alta</div>
</div><div class="card">
<div class="card-title">Últimos Sinais</div>
<div class="last-signals"><div class="signal-item">ETH LONG +1.2%</div>
<div class="signal-item">SOL LONG +0.8%</div>
<div class="signal-item">BTC SHORT -0.4%</div>
<div class="signal-item">ATOM LONG +1.5%</div>
<div class="signal-item">BNB LONG +0.6%</div>
<div class="signal-item">ADA SHORT -0.2%</div>
<div class="signal-item">DOGE LONG +0.9%</div></div>
</div></div><div class="footer">
Robô IA Profissional v4.0
</div></div></body>
</html>
