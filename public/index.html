<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bruno Cripto Trader Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #1a1f3a;
            --bg-card: rgba(30, 41, 59, 0.8);
            --accent-gold: #fbbf24;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --border-color: rgba(100, 116, 139, 0.3);
        }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Header com Logo */
        .header {
            background: linear-gradient(135deg, rgba(13, 27, 62, 0.95), rgba(25, 35, 75, 0.95));
            backdrop-filter: blur(20px);
            border-bottom: 2px solid rgba(251, 191, 36, 0.3);
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }
        
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }
        
        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(251, 191, 36, 0.5);
            animation: pulse-glow 3s ease-in-out infinite;
        }
        
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 30px rgba(251, 191, 36, 0.5); }
            50% { box-shadow: 0 0 50px rgba(251, 191, 36, 0.8); }
        }
        
        .logo-text {
            display: flex;
            flex-direction: column;
        }
        
        .logo-title {
            font-size: 1.8em;
            font-weight: 900;
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 50%, #d97706 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }
        
        .logo-subtitle {
            font-size: 0.9em;
            color: var(--accent-green);
            font-weight: 600;
        }
        
        .header-stats {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .stat-badge {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--accent-green);
            border-radius: 20px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-green);
            border-radius: 50%;
            animation: blink 2s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        /* Container Principal */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Grid de Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border-color: var(--accent-gold);
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-gold), var(--accent-blue));
        }
        
        .stat-label {
            color: var(--text-secondary);
            font-size: 0.85em;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-value {
            font-size: 2em;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .stat-icon {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 2em;
            opacity: 0.2;
        }
        
        /* Controles */
        .controls {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
        }
        
        .control-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }
        
        .btn {
            padding: 15px 25px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.95em;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .btn:hover::before {
            width: 300px;
            height: 300px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-green) 0%, #059669 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, var(--accent-red) 0%, #dc2626 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
        }
        
        .btn-info {
            background: linear-gradient(135deg, var(--accent-blue) 0%, #2563eb 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }
        
        /* Grid Principal */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        @media (max-width: 968px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
        
        /* Card de Sinal */
        .signal-card {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(139, 92, 246, 0.15));
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            border: 2px solid rgba(99, 102, 241, 0.5);
            position: relative;
            overflow: hidden;
        }
        
        .signal-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, transparent 70%);
            animation: rotate 10s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .signal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }
        
        .signal-pair {
            font-size: 1.8em;
            font-weight: 900;
            color: white;
            text-shadow: 0 0 20px rgba(99, 102, 241, 0.5);
        }
        
        .signal-score {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 700;
            font-size: 1.1em;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }
        
        .signal-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 15px;
            position: relative;
            z-index: 1;
        }
        
        .signal-detail {
            background: rgba(15, 23, 42, 0.6);
            padding: 12px;
            border-radius: 10px;
            border-left: 3px solid var(--accent-green);
        }
        
        .signal-detail-label {
            color: var(--text-secondary);
            font-size: 0.85em;
            margin-bottom: 5px;
        }
        
        .signal-detail-value {
            font-size: 1.2em;
            font-weight: 700;
            color: var(--accent-green);
        }
        
        /* Chart Canvas */
        .chart-container {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid var(--border-color);
            height: 400px;
        }
        
        .chart-container canvas {
            max-height: 350px;
        }
        
        /* Logs */
        .logs-section {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid var(--border-color);
        }
        
        .section-title {
            font-size: 1.3em;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logs-container {
            background: rgba(15, 23, 42, 0.8);
            border-radius: 10px;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
        }
        
        .log-item {
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 5px;
            display: flex;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .log-time {
            color: var(--text-secondary);
            min-width: 80px;
        }
        
        .log-success { background: rgba(16, 185, 129, 0.1); color: var(--accent-green); border-left: 3px solid var(--accent-green); }
        .log-info { background: rgba(59, 130, 246, 0.1); color: var(--accent-blue); border-left: 3px solid var(--accent-blue); }
        .log-warning { background: rgba(245, 158, 11, 0.1); color: #fbbf24; border-left: 3px solid #fbbf24; }
        .log-error { background: rgba(239, 68, 68, 0.1); color: var(--accent-red); border-left: 3px solid var(--accent-red); }
        
        /* Scrollbar */
        .logs-container::-webkit-scrollbar {
            width: 8px;
        }
        
        .logs-container::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
            border-radius: 10px;
        }
        
        .logs-container::-webkit-scrollbar-thumb {
            background: var(--accent-gold);
            border-radius: 10px;
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 30px;
            color: var(--text-secondary);
        }
        
        .spinner {
            border: 4px solid rgba(251, 191, 36, 0.2);
            border-top: 4px solid var(--accent-gold);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Toast Notification */
        .toast {
            position: fixed;
            top: 100px;
            right: 20px;
            background: linear-gradient(135deg, var(--accent-green), #059669);
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 2000;
        }
        
        .toast.show {
            transform: translateX(0);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
            }
            
            .logo {
                width: 60px;
                height: 60px;
            }
            
            .logo-title {
                font-size: 1.3em;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .signal-details {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-content">
            <div class="logo-section">
                <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" alt="Logo" class="logo" id="logo">
                <div class="logo-text">
                    <div class="logo-title">BRUNO TRADER PRO</div>
                    <div class="logo-subtitle">V4.0 Professional</div>
                </div>
            </div>
            <div class="header-stats">
                <div class="stat-badge">
                    <span class="status-dot"></span>
                    <span id="header-status">Online</span>
                </div>
                <div class="stat-badge" style="border-color: var(--accent-blue);">
                    <span>⏱</span>
                    <span id="header-uptime">0m</span>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-icon">📊</span>
                <div class="stat-label">Análises</div>
                <div class="stat-value" id="stat-analysis">0</div>
            </div>
            <div class="stat-card">
                <span class="stat-icon">🎯</span>
                <div class="stat-label">Sinais</div>
                <div class="stat-value" id="stat-signals">0</div>
            </div>
            <div class="stat-card">
                <span class="stat-icon">📈</span>
                <div class="stat-label">Win Rate</div>
                <div class="stat-value" id="stat-winrate">0%</div>
            </div>
            <div class="stat-card">
                <span class="stat-icon">💰</span>
                <div class="stat-label">Profit</div>
                <div class="stat-value" id="stat-profit">R$ 0</div>
            </div>
        </div>

        <!-- Controles -->
        <div class="controls">
            <div class="control-buttons">
                <button class="btn btn-primary">
                    <span>▶</span>
                    <span>Iniciar Bot</span>
                </button>
                <button class="btn btn-danger">
                    <span>⏸</span>
                    <span>Parar Bot</span>
                </button>
                <button class="btn btn-info" onclick="updateData()">
                    <span>🔄</span>
                    <span>Atualizar</span>
                </button>
            </div>
        </div>

        <!-- Grid Principal -->
        <div class="main-grid">
            <!-- Último Sinal -->
            <div class="signal-card">
                <div class="section-title">
                    <span>🚀</span>
                    <span>Último Sinal</span>
                </div>
                <div id="signal-container">
                    <div class="loading">
                        <div class="spinner"></div>
                        Aguardando sinal...
                    </div>
                </div>
            </div>

            <!-- Gráfico de Performance -->
            <div class="chart-container">
                <div class="section-title">
                    <span>📈</span>
                    <span>Performance</span>
                </div>
                <canvas id="performanceChart"></canvas>
            </div>
        </div>

        <!-- Logs -->
        <div class="logs-section">
            <div class="section-title">
                <span>📝</span>
                <span>Logs do Sistema</span>
            </div>
            <div class="logs-container" id="logs">
                <div class="loading">
                    <div class="spinner"></div>
                    Carregando logs...
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">Novo sinal detectado!</div>

    <script>
        let chart = null;
        let lastSignalCount = 0;

        // Inicializa gráfico
        function initChart() {
            const ctx = document.getElementById('performanceChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Profit',
                        data: [],
                        borderColor: '#10b981',
                        backgroundColor: 'rgba(16, 185, 129, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: { color: '#fff' }
                        }
                    },
                    scales: {
                        y: {
                            ticks: { color: '#94a3b8' },
                            grid: { color: 'rgba(100, 116, 139, 0.1)' }
                        },
                        x: {
                            ticks: { color: '#94a3b8' },
                            grid: { color: 'rgba(100, 116, 139, 0.1)' }
                        }
                    }
                }
            });
        }

        // Atualiza dados
        async function updateData() {
            try {
                const statusRes = await fetch('/api/status');
                const status = await statusRes.json();
                
                document.getElementById('header-status').textContent = status.status === 'online' ? 'Online' : 'Offline';
                document.getElementById('header-uptime').textContent = Math.floor(status.uptime / 60) + 'm';
                document.getElementById('stat-analysis').textContent = status.analysisCount || 0;
                document.getElementById('stat-signals').textContent = status.signalsCount || 0;
                document.getElementById('stat-winrate').textContent = (status.stats?.winRate || 0) + '%';
                document.getElementById('stat-profit').textContent = 'R$ ' + (status.stats?.totalProfit || 0).toFixed(2);
                
                const signalsRes = await fetch('/api/signals');
                const signalsData = await signalsRes.json();
                
                if (signalsData.signals && signalsData.signals.length > 0) {
                    const signal = signalsData.signals[0];
                    
                    if (signalsData.total > lastSignalCount) {
                        showToast('Novo sinal detectado!');
                        lastSignalCount = signalsData.total;
                    }
                    
                    const signalHTML = `
                        <div class="signal-header">
                            <div class="signal-pair">${signal.symbol} ${signal.direction}</div>
                            <div class="signal-score">${signal.score || signal.confidenceScore || 0}/100</div>
                        </div>
                        <div class="signal-details">
                            <div class="signal-detail">
                                <div class="signal-detail-label">💰 Entrada</div>
                                <div class="signal-detail-value">$${signal.entry}</div>
                            </div>
                            <div class="signal-detail">
                                <div class="signal-detail-label">🛑 Stop</div>
                                <div class="signal-detail-value">$${signal.stopLoss}</div>
                            </div>
                            <div class="signal-detail">
                                <div class="signal-detail-label">🎯 TP1</div>
                                <div class="signal-detail-value">$${signal.tp1}</div>
                            </div>
                            <div class="signal-detail">
                                <div class="signal-detail-label">🎯 TP2</div>
                                <div class="signal-detail-value">$${signal.tp2}</div>
                            </div>
                            <div class="signal-detail">
                                <div class="signal-detail-label">⚖️ R:R</div>
                                <div class="signal-detail-value">1:${signal.rr || '0'}</div>
                            </div>
                            <div class="signal-detail">
                                <div class="signal-detail-label">📊 Volume</div>
                                <div class="signal-detail-value">${signal.volumeRatio || 'N/A'}x</div>
                            </div>
                        </div>
                    `;
                    document.getElementById('signal-container').innerHTML = signalHTML;
                }
                
                const logsRes = await fetch('/api/logs');
                const logsData = await logsRes.json();
                
                if (logsData.logs && logsData.logs.length > 0) {
                    const logsHTML = logsData.logs.slice(0, 20).map(log => {
                        const time = new Date(log.timestamp).toLocaleTimeString('pt-BR');
                        return `<div class="log-item log-${log.type}">
                            <span class="log-time">[${time}]</span>
                            <span>${log.message}</span>
                        </div>`;
                    }).join('');
                    document.getElementById('logs').innerHTML = logsHTML;
                }
                
                if (status.stats && status.stats.totalTrades > 0) {
                    updateChart(status.stats);
                }
                
            } catch (error) {
                console.error('Erro ao atualizar:', error);
            }
        }

        function updateChart(stats) {
            if (!chart) return;
            
            const now = new Date().toLocaleTimeString('pt-BR');
            if (chart.data.labels.length > 10) {
                chart.data.labels.shift();
                chart.data.datasets[0].data.shift();
            }
            chart.data.labels.push(now);
            chart.data.datasets[0].data.push(stats.totalProfit);
            chart.update();
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        initChart();
        updateData();
        setInterval(updateData, 10000);
    </script>
</body>
</html>
