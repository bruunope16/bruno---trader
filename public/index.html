<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bruno Cripto Trader</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

* {
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Inter', sans-serif;
}

body{
background:#0b0f1c;
color:white;
padding:10px;
}

/* Logo */

.logo{
text-align:center;
margin-bottom:15px;
}

.logo img{
width:220px;
}

/* Card */

.card{
background:#111827;
border-radius:16px;
padding:15px;
margin-bottom:15px;
box-shadow:0 0 20px rgba(0,255,170,0.1);
animation:fade 0.6s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1}
}

/* Status */

.status{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.badge{
background:#00c896;
padding:4px 10px;
border-radius:8px;
font-size:12px;
}

/* Sinais Scroll */

.signals-scroll{
display:flex;
overflow-x:auto;
gap:10px;
padding-bottom:10px;
}

.signal-item{
min-width:220px;
background:#0f172a;
padding:12px;
border-radius:12px;
}

.green{
color:#00ffae;
}

.red{
color:#ff4d4d;
}

/* Progress */

.progress{
height:6px;
background:#222;
border-radius:10px;
overflow:hidden;
margin-top:8px;
}

.progress-bar{
height:100%;
background:linear-gradient(90deg,#00ffae,#00c3ff);
width:65%;
}

/* Grid */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

/* Chart */

canvas{
margin-top:10px;
}

/* Ranking */

.rank-item{
display:flex;
justify-content:space-between;
padding:6px 0;
}

/* Toast */

.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#00c896;
padding:12px 20px;
border-radius:10px;
display:none;
}

/* Bot Status */

.bot-status{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.online{
color:#00ffae;
}

</style>

</head>

<body>

<div class="logo">
<img src="logo.png">
</div>

<div class="card">

<div class="bot-status">
<div>🤖 Bot Status</div>
<div class="online">🟢 Online</div>
</div>

<div>Monitorando 60 pares</div>

</div>

<div class="card">

<h3>🚨 Últimos Sinais</h3>

<div class="signals-scroll" id="signals">

</div>

</div>

<div class="card">

<h3>📊 Progresso Trade</h3>

Entrada → TP1 → TP2 → TP3

<div class="progress">
<div class="progress-bar"></div>
</div>

</div>

<div class="card">

<h3>📈 Performance</h3>

<canvas id="chart"></canvas>

</div>

<div class="grid">

<div class="card">

<h3>📊 Estatísticas Hoje</h3>

<div>Sinais: 8</div>
<div>Win Rate: <span class="green">75%</span></div>
<div>Lucro: <span class="green">+3.4%</span></div>

</div>

<div class="card">

<h3>🔥 Ranking</h3>

<div class="rank-item">
<div>BTCUSDT</div>
<div class="green">+1.2%</div>
</div>

<div class="rank-item">
<div>ETHUSDT</div>
<div class="green">+2.4%</div>
</div>

<div class="rank-item">
<div>SOLUSDT</div>
<div class="green">+4.1%</div>
</div>

</div>

</div>

<div class="toast" id="toast">
Novo Sinal Detectado 🚀
</div>

<script>

const signals = [
{pair:"BTCUSDT",dir:"LONG",score:87},
{pair:"ETHUSDT",dir:"SHORT",score:82},
{pair:"SOLUSDT",dir:"LONG",score:90},
{pair:"BNBUSDT",dir:"LONG",score:75},
{pair:"ADAUSDT",dir:"SHORT",score:70},
{pair:"XRPUSDT",dir:"LONG",score:88},
{pair:"DOGEUSDT",dir:"LONG",score:79},
{pair:"MATICUSDT",dir:"SHORT",score:81},
{pair:"AVAXUSDT",dir:"LONG",score:85},
{pair:"DOTUSDT",dir:"LONG",score:84}
];

const container = document.getElementById("signals");

signals.forEach(s=>{

container.innerHTML += `

<div class="signal-item">

<div>${s.pair}</div>

<div class="${s.dir=="LONG"?"green":"red"}">
${s.dir}
</div>

<div>Score ${s.score}</div>

</div>

`

})

/* Chart */

const ctx = document.getElementById('chart');

new Chart(ctx, {
type:'line',
data:{
labels:["1","2","3","4","5","6"],
datasets:[{
data:[1000,1050,1030,1100,1150,1200],
borderColor:"#00ffae",
tension:0.4
}]
},
options:{
plugins:{legend:{display:false}},
scales:{
x:{display:false},
y:{display:false}
}
}
})

/* Real Time */

setInterval(()=>{

document.getElementById("toast").style.display="block"

setTimeout(()=>{
document.getElementById("toast").style.display="none"
},2000)

},15000)

</script>

</body>
</html>
