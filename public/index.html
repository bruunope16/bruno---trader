<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bruno Cripto Trader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        /* Logo Header */
        .logo-header {
            background: linear-gradient(135deg, rgba(13, 27, 62, 0.9), rgba(25, 35, 75, 0.9));
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            text-align: center;
            border: 2px solid rgba(52, 211, 153, 0.3);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }
        
        .logo-header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(52, 211, 153, 0.1) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        
        .logo-title {
            font-size: 2.5em;
            font-weight: 900;
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 50%, #d97706 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(251, 191, 36, 0.5);
            letter-spacing: 2px;
            position: relative;
            z-index: 1;
        }
        
        .logo-subtitle {
            font-size: 0.9em;
            color: #34d399;
            margin-top: 10px;
            font-weight: 600;
            position: relative;
            z-index: 1;
        }
        
        /* Cards */
        .card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8), rgba(51, 65, 85, 0.6));
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 116, 139, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            font-size: 1.2em;
            font-weight: 700;
        }
        
        .card-header-icon {
            font-size: 1.3em;
        }
        
        /* Sistema Status */
        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 10px;
            border-left: 3px solid #34d399;
        }
        
        .status-label {
            color: #94a3b8;
            font-size: 0.9em;
        }
        
        .status-value {
            font-weight: 700;
            font-size: 1.1em;
        }
        
        .status-online {
            color: #34d399;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            background: #34d399;
            border-radius: 50%;
            animation: blink 2s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        /* Botões de Controle */
        .control-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-start {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }
        
        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.6);
        }
        
        .btn-stop {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
        }
        
        .btn-stop:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.6);
        }
        
        .btn-refresh {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }
        
        .btn-refresh:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
        }
        
        /* Último Sinal */
        .signal-card {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(139, 92, 246, 0.2));
            border: 2px solid rgba(99, 102, 241, 0.5);
            border-radius: 15px;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        
        .signal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .signal-pair {
            font-size: 1.5em;
            font-weight: 900;
            color: #fff;
        }
        
        .signal-score {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.9em;
        }
        
        .signal-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 10px;
        }
        
        .signal-detail {
            background: rgba(15, 23, 42, 0.5);
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85em;
        }
        
        .signal-detail strong {
            color: #34d399;
        }
        
        .signal-rr {
            background: rgba(16, 185, 129, 0.2);
            padding: 8px 12px;
            border-radius: 8px;
            display: inline-block;
            margin-top: 10px;
            font-weight: 700;
            color: #34d399;
        }
        
        .mini-chart {
            height: 60px;
            background: linear-gradient(to right, transparent, rgba(52, 211, 153, 0.1), rgba(52, 211, 153, 0.2));
            border-radius: 8px;
            margin-top: 10px;
            position: relative;
            overflow: hidden;
        }
        
        .chart-line {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 100%;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 100 30' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0,15 Q25,5 50,15 T100,10' stroke='%2334d399' stroke-width='2' fill='none'/%3E%3C/svg%3E");
            background-size: cover;
            opacity: 0.6;
        }
        
        .copy-btn {
            background: rgba(100, 116, 139, 0.3);
            border: 1px solid rgba(148, 163, 184, 0.5);
            color: #cbd5e1;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .copy-btn:hover {
            background: rgba(100, 116, 139, 0.5);
            border-color: #34d399;
            color: #34d399;
        }
        
        /* Resultados */
        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .result-item {
            background: rgba(15, 23, 42, 0.6);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        
        .result-label {
            color: #94a3b8;
            font-size: 0.85em;
            margin-bottom: 5px;
        }
        
        .result-value {
            font-size: 1.5em;
            font-weight: 900;
        }
        
        .profit-positive {
            color: #34d399;
        }
        
        .profit-negative {
            color: #ef4444;
        }
        
        /* Logs */
        .logs-container {
            background: rgba(15, 23, 42, 0.8);
            border-radius: 10px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
        }
        
        .log-item {
            padding: 8px;
            margin-bottom: 5px;
            border-radius: 5px;
            display: flex;
            gap: 10px;
        }
        
        .log-time {
            color: #64748b;
            min-width: 80px;
        }
        
        .log-success { background: rgba(16, 185, 129, 0.1); color: #34d399; }
        .log-info { background: rgba(59, 130, 246, 0.1); color: #60a5fa; }
        .log-warning { background: rgba(245, 158, 11, 0.1); color: #fbbf24; }
        .log-error { background: rgba(239, 68, 68, 0.1); color: #f87171; }
        
        /* Scrollbar */
        .logs-container::-webkit-scrollbar {
            width: 8px;
        }
        
        .logs-container::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
            border-radius: 10px;
        }
        
        .logs-container::-webkit-scrollbar-thumb {
            background: rgba(100, 116, 139, 0.5);
            border-radius: 10px;
        }
        
        .logs-container::-webkit-scrollbar-thumb:hover {
            background: rgba(100, 116, 139, 0.7);
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 20px;
            color: #64748b;
        }
        
        .spinner {
            border: 3px solid rgba(100, 116, 139, 0.3);
            border-top: 3px solid #34d399;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo Header -->
        <div class="logo-header">
            <div class="logo-title">BRUNO<br>CRIPTO TRADER</div>
            <div class="logo-subtitle">Versão 4.0.0 • Scalp Pro</div>
        </div>
        
        <!-- Sistema Status -->
        <div class="card">
            <div class="card-header">
                <span class="card-header-icon">🚀</span>
                <span>Sistema</span>
            </div>
            
            <div class="status-grid">
                <div class="status-item">
                    <span class="status-label">Status</span>
                    <span class="status-value status-online">
                        <span class="status-dot"></span>
                        <span id="status">Online</span>
                    </span>
                </div>
                <div class="status-item">
                    <span class="status-label">Uptime</span>
                    <span class="status-value" id="uptime">0 min</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Risco</span>
                    <span class="status-value" id="risk">2%</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Pares</span>
                    <span class="status-value" id="pairs">10</span>
                </div>
            </div>
            
            <div class="control-buttons">
                <button class="btn btn-start">▶ Iniciar Bot</button>
                <button class="btn btn-stop">⏸ Parar Bot</button>
                <button class="btn btn-refresh" onclick="updateData()">🔄 Atualizar</button>
            </div>
        </div>
        
        <!-- Último Sinal -->
        <div class="card">
            <div class="card-header">
                <span class="card-header-icon">🚀</span>
                <span>Último Sinal</span>
                <button class="copy-btn" style="margin-left: auto;">📋 Copiar</button>
            </div>
            
            <div id="signal-container">
                <div class="loading">Carregando último sinal...</div>
            </div>
        </div>
        
        <!-- Resultados -->
        <div class="card">
            <div class="card-header">
                <span class="card-header-icon">📊</span>
                <span>Resultados</span>
            </div>
            
            <div class="results-grid">
                <div class="result-item">
                    <div class="result-label">Trades</div>
                    <div class="result-value" id="trades">0</div>
                </div>
                <div class="result-item">
                    <div class="result-label">Lucro</div>
                    <div class="result-value profit-positive" id="profit">R$ 0.00</div>
                </div>
            </div>
        </div>
        
        <!-- Logs do Sistema -->
        <div class="card">
            <div class="card-header">
                <span class="card-header-icon">📝</span>
                <span>Logs do Sistema</span>
            </div>
            
            <div class="logs-container" id="logs">
                <div class="loading">
                    <div class="spinner"></div>
                    Carregando logs...
                </div>
            </div>
        </div>
    </div>

    <script>
        // Atualizar dados
        async function updateData() {
            try {
                // Status
                const statusRes = await fetch('/api/status');
                const status = await statusRes.json();
                
                document.getElementById('status').textContent = status.status === 'online' ? 'Online' : 'Offline';
                document.getElementById('uptime').textContent = Math.floor(status.uptime / 60) + ' min';
                document.getElementById('risk').textContent = status.config?.risk || '2%';
                document.getElementById('pairs').textContent = status.config?.pairs || '10';
                
                // Sinais
                const signalsRes = await fetch('/api/signals');
                const signalsData = await signalsRes.json();
                
                if (signalsData.signals && signalsData.signals.length > 0) {
                    const signal = signalsData.signals[0];
                    const signalHTML = `
                        <div class="signal-card">
                            <div class="signal-header">
                                <span class="signal-pair">${signal.symbol} ${signal.direction}</span>
                                <span class="signal-score">${signal.confidenceScore || signal.score || 72}/100</span>
                            </div>
                            <div class="signal-details">
                                <div class="signal-detail"><strong>Entrada:</strong> $${signal.entry}</div>
                                <div class="signal-detail"><strong>Stop:</strong> $${signal.stopLoss}</div>
                                <div class="signal-detail"><strong>TP1:</strong> $${signal.tp1}</div>
                                <div class="signal-detail"><strong>TP2:</strong> $${signal.tp2 || signal.tp3 || 'N/A'}</div>
                            </div>
                            <div class="signal-rr">R:R: 1:${signal.rr || '1.55'} | RSI: ${signal.rsi || 'N/A'}</div>
                            <div class="mini-chart">
                                <div class="chart-line"></div>
                            </div>
                        </div>
                    `;
                    document.getElementById('signal-container').innerHTML = signalHTML;
                } else {
                    document.getElementById('signal-container').innerHTML = '<div class="loading">Aguardando próximo sinal...</div>';
                }
                
                // Stats
                document.getElementById('trades').textContent = status.stats?.totalTrades || 0;
                const profit = status.stats?.totalProfit || 0;
                const profitEl = document.getElementById('profit');
                profitEl.textContent = 'R$ ' + profit.toFixed(2);
                profitEl.className = 'result-value ' + (profit >= 0 ? 'profit-positive' : 'profit-negative');
                
                // Logs
                const logsRes = await fetch('/api/logs');
                const logsData = await logsRes.json();
                
                if (logsData.logs && logsData.logs.length > 0) {
                    const logsHTML = logsData.logs.slice(0, 15).map(log => {
                        const time = new Date(log.timestamp).toLocaleTimeString('pt-BR');
                        return `<div class="log-item log-${log.type}"><span class="log-time">[${time}]</span><span>${log.message}</span></div>`;
                    }).join('');
                    document.getElementById('logs').innerHTML = logsHTML;
                }
                
            } catch (error) {
                console.error('Erro ao atualizar:', error);
            }
        }
        
        // Atualizar a cada 10 segundos
        updateData();
        setInterval(updateData, 10000);
    </script>
</body>
</html>
